name: Chimera Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Job 1: Core features ──────────────────────────────────────────
  basics:
    runs-on: [self-hosted, chimera]
    steps:
      - name: Hello
        run: echo "Hello from chimera runner!"

      - name: System info
        run: |
          echo "OS: $(uname -s)"
          echo "Arch: $(uname -m)"
          echo "User: $(whoami)"
          echo "PWD: $(pwd)"

      - name: Environment
        run: |
          echo "GITHUB_ACTIONS=$GITHUB_ACTIONS"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "GITHUB_STATE=$GITHUB_STATE"
          echo "GITHUB_STEP_SUMMARY=$GITHUB_STEP_SUMMARY"
          echo "RUNNER_OS=$RUNNER_OS"
          echo "RUNNER_NAME=$RUNNER_NAME"

      - name: Cargo version
        run: cargo --version

  # ── Job 2: Node.js actions ────────────────────────────────────────
  actions:
    runs-on: [self-hosted, chimera]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify checkout
        run: |
          echo "Checking repo was cloned..."
          test -f Cargo.toml
          echo "Cargo.toml exists — checkout worked"

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Verify rustc
        run: |
          rustc --version
          cargo --version

      - name: Build project
        run: cargo build

      - name: Run tests
        run: cargo test

  # ── Job 3: Composite actions ──────────────────────────────────────
  composite:
    runs-on: [self-hosted, chimera]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Greet quietly
        uses: ./.github/actions/greet
        with:
          name: chimera

      - name: Greet loudly
        uses: ./.github/actions/greet
        with:
          name: chimera
          loud: 'true'

  # ── Job 4: Conditions ─────────────────────────────────────────────
  conditions:
    runs-on: [self-hosted, chimera]
    steps:
      - name: This succeeds
        run: echo "I will succeed"

      - name: This fails (continue)
        run: exit 1
        continue-on-error: true

      - name: Runs after continue-on-error failure
        run: echo "Still going despite previous failure"

      - name: Force failure
        run: exit 42

      - name: Skipped by default (previous failed)
        run: echo "You should NOT see this"

      - name: Runs on failure
        if: failure()
        run: echo "Running because a step failed"

      - name: Always runs
        if: always()
        run: echo "I always run, no matter what"

  # ── Job 5: Secrets ───────────────────────────────────────────────
  secrets:
    runs-on: [self-hosted, chimera]
    steps:
      - name: Use secret
        env:
          MY_SECRET: ${{ secrets.SECRET }}
        run: |
          if [ -z "$MY_SECRET" ]; then
            echo "::error::SECRET is empty"
            exit 1
          fi
          echo "Secret is set (masked)"

  # ── Job 6: Needs ───────────────────────────────────────────────
  setup:
    runs-on: [self-hosted, chimera]
    outputs:
      greeting: ${{ steps.gen.outputs.greeting }}
    steps:
      - name: Generate output
        id: gen
        run: echo "greeting=hello from setup" >> "$GITHUB_OUTPUT"

  needs:
    runs-on: [self-hosted, chimera]
    needs: setup
    steps:
      - name: Use needs output
        run: |
          echo "Greeting from setup job: ${{ needs.setup.outputs.greeting }}"
          test "${{ needs.setup.outputs.greeting }}" = "hello from setup"

      - name: Check needs result
        if: needs.setup.result == 'success'
        run: echo "Setup job succeeded as expected"
