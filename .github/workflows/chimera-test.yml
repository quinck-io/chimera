name: Chimera Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Job 1: Core features ──────────────────────────────────────────
  basics:
    runs-on: [self-hosted, chimera]
    steps:
      - name: Hello
        run: echo "Hello from chimera runner!"

      - name: System info
        run: |
          echo "OS: $(uname -s)"
          echo "Arch: $(uname -m)"
          echo "User: $(whoami)"
          echo "PWD: $(pwd)"

      - name: Environment
        run: |
          echo "GITHUB_ACTIONS=$GITHUB_ACTIONS"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "GITHUB_STATE=$GITHUB_STATE"
          echo "GITHUB_STEP_SUMMARY=$GITHUB_STEP_SUMMARY"
          echo "RUNNER_OS=$RUNNER_OS"
          echo "RUNNER_NAME=$RUNNER_NAME"

      - name: Cargo version
        run: cargo --version

  # ── Job 2: Node.js actions w/container  ────────────────────────────────────────
  actions:
    runs-on: [self-hosted, chimera]
    container:
      image: ubuntu:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify checkout
        run: |
          echo "Checking repo was cloned..."
          test -f Cargo.toml
          echo "Cargo.toml exists — checkout worked"

      - name: install deps
        run: apt-get update && apt-get install -y curl build-essential

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Verify rustc
        run: |
          rustc --version
          cargo --version

      - name: Build project
        run: cargo build

      - name: Run tests
        run: cargo test

  # ── Job 3: Composite actions ──────────────────────────────────────
  composite:
    runs-on: [self-hosted, chimera]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Greet quietly
        uses: ./.github/actions/greet
        with:
          name: chimera

      - name: Greet loudly
        uses: ./.github/actions/greet
        with:
          name: chimera
          loud: "true"

  # ── Job 4: Conditions ─────────────────────────────────────────────
  conditions:
    runs-on: [self-hosted, chimera]
    steps:
      - name: This succeeds
        run: echo "I will succeed"

      - name: This fails (continue)
        id: soft_fail
        run: exit 1
        continue-on-error: true

      - name: Runs after continue-on-error failure
        run: echo "Still going despite previous failure"

      - name: Verify soft failure outcome
        run: test "${{ steps.soft_fail.outcome }}" = "failure"

      - name: Verify soft failure conclusion is success
        run: test "${{ steps.soft_fail.conclusion }}" = "success"

      - name: Force failure (continue)
        id: hard_fail
        run: exit 42
        continue-on-error: true

      - name: Next step still runs
        run: echo "Job continues because continue-on-error absorbed the failure"

      - name: Verify hard failure was detected
        if: always()
        run: test "${{ steps.hard_fail.outcome }}" = "failure"

      - name: Always runs
        if: always()
        run: echo "I always run, no matter what"

  # ── Job 5: Secrets ───────────────────────────────────────────────
  secrets:
    runs-on: [self-hosted, chimera]
    steps:
      - name: Use secret
        env:
          MY_SECRET: ${{ secrets.SECRET }}
        run: |
          if [ -z "$MY_SECRET" ]; then
            echo "::error::SECRET is empty"
            exit 1
          fi
          echo "Secret is set (masked)"

  # ── Job 6: hashFiles ────────────────────────────────────────────
  hashfiles:
    runs-on: [self-hosted, chimera]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug workspace
        run: echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE" && ls "$GITHUB_WORKSPACE/Cargo.toml"

      - name: hashFiles single file
        run: echo "${{ hashFiles('Cargo.toml') }}" | grep -qE '^[0-9a-f]{64}$'

      - name: hashFiles is deterministic
        run: test "${{ hashFiles('Cargo.toml') }}" = "${{ hashFiles('Cargo.toml') }}"

      - name: hashFiles recursive glob
        run: echo "${{ hashFiles('**/*.rs') }}" | grep -qE '^[0-9a-f]{64}$'

      - name: hashFiles multiple patterns differ from single
        run: test "${{ hashFiles('Cargo.toml') }}" != "${{ hashFiles('Cargo.toml', 'Cargo.lock') }}"

      - name: hashFiles no match returns empty
        run: test -z "${{ hashFiles('*.this-extension-does-not-exist') }}"

      - name: hashFiles in cache key expression
        run: echo "${{ format('{0}-deps-{1}', runner.os, hashFiles('Cargo.toml', 'Cargo.lock')) }}"

  # ── Job 7: Docker actions ───────────────────────────────────────
  docker-actions:
    runs-on: [self-hosted, chimera]
    steps:
      - name: Inline docker://alpine echo
        uses: docker://alpine:3.19
        with:
          args: echo "Hello from inline docker action!"

      - name: Inline docker://alpine entrypoint override
        uses: docker://alpine:3.19
        with:
          entrypoint: /bin/sh
          args: -c "echo Entrypoint override works && uname -a"

      - name: Inline docker://alpine exit code
        uses: docker://alpine:3.19
        with:
          entrypoint: /bin/sh
          args: -c "exit 0"

      - name: Inline docker://alpine env vars
        uses: docker://alpine:3.19
        env:
          GREETING: hello-from-env
        with:
          entrypoint: /bin/sh
          args: -c "echo $GREETING"

      - name: Inline docker://node
        uses: docker://node:20-alpine
        with:
          entrypoint: node
          args: -e "console.log('Node ' + process.version + ' inside docker action')"

      - name: Checkout (for repo docker action)
        uses: actions/checkout@v4

      - name: Repo docker action
        uses: ./.github/actions/docker-hello
        with:
          name: chimera

      - name: Repo docker action with workflow commands
        uses: ./.github/actions/docker-hello
        with:
          name: chimera-output
        id: docker_out

      - name: Verify docker action output
        run: |
          echo "Got greeting: ${{ steps.docker_out.outputs.greeting }}"
          test -n "${{ steps.docker_out.outputs.greeting }}"

  # ── Job 7b: Docker actions with services ───────────────────────
  docker-actions-services:
    runs-on: [self-hosted, chimera]
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
    steps:
      - name: Docker action on service network
        uses: docker://alpine:3.19
        with:
          entrypoint: /bin/sh
          args: -c "apk add --no-cache netcat-openbsd && nc -z redis 6379 && echo 'Redis is reachable from docker action!'"

  # ── Job 7c: Service health checks + job context ─────────────────
  service-health-and-job-context:
    runs-on: [self-hosted, chimera]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5433:5432
        options: --health-cmd "pg_isready -U postgres" --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6381:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 5
    steps:
      - name: Services are healthy (postgres)
        run: |
          apt-get update -qq && apt-get install -y -qq postgresql-client > /dev/null 2>&1 || true
          pg_isready -h localhost -p 5432 -U postgres || echo "pg_isready not available, port check instead"
          echo "Postgres service started and healthy"

      - name: Services are healthy (redis)
        run: |
          command -v redis-cli > /dev/null 2>&1 && redis-cli -h localhost -p 6381 ping || echo "redis-cli not available, skipping direct check"
          echo "Redis service started and healthy"

      - name: "job.status is success"
        run: test "${{ job.status }}" = "success"

      - name: "job.services.postgres.id is set"
        run: |
          id="${{ job.services.postgres.id }}"
          echo "Postgres container ID: $id"
          test -n "$id"

      - name: "job.services.redis.id is set"
        run: |
          id="${{ job.services.redis.id }}"
          echo "Redis container ID: $id"
          test -n "$id"

      - name: "job.services.postgres.ports['5432'] is mapped"
        run: |
          port="${{ job.services.postgres.ports['5432'] }}"
          echo "Postgres host port: $port"
          test -n "$port"

      - name: "job.services.redis.ports['6379'] is mapped"
        run: |
          port="${{ job.services.redis.ports['6379'] }}"
          echo "Redis host port: $port"
          test -n "$port"

  # ── Job 7d: Job context in container mode ──────────────────────
  job-context-container:
    runs-on: [self-hosted, chimera]
    container:
      image: ubuntu:latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6382:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 5
    steps:
      - name: "job.status is success"
        run: test "${{ job.status }}" = "success"

      - name: "job.container.id is set"
        run: |
          id="${{ job.container.id }}"
          echo "Job container ID: $id"
          test -n "$id"

      - name: "job.container.network is set"
        run: |
          net="${{ job.container.network }}"
          echo "Job network: $net"
          test -n "$net"

      - name: "job.services.redis.id is set"
        run: |
          id="${{ job.services.redis.id }}"
          echo "Redis container ID: $id"
          test -n "$id"

      - name: Redis reachable by alias
        run: |
          apt-get update -qq && apt-get install -y -qq netcat-openbsd > /dev/null 2>&1
          nc -z redis 6379
          echo "Redis reachable on service network"

  # ── Job 7e: job.status reflects failure ────────────────────────
  job-status-failure:
    runs-on: [self-hosted, chimera]
    steps:
      - name: Fail on purpose
        id: breaker
        run: exit 1
        continue-on-error: true

      - name: "job.status should still be success (continue-on-error absorbed it)"
        run: test "${{ job.status }}" = "success"

  # ── Job 8: Cache (host mode) ────────────────────────────────────
  cache-host:
    runs-on: [self-hosted, chimera]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache cargo registry
        id: cache-cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-host-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-host-

      - name: Show cache result
        run: |
          echo "Cache hit: ${{ steps.cache-cargo.outputs.cache-hit }}"
          echo "ACTIONS_CACHE_URL=$ACTIONS_CACHE_URL"

      - name: Build (populates cache on miss)
        run: cargo check

  # ── Job 8b: Cache (host mode, second run verifies hit) ─────────
  cache-host-verify:
    runs-on: [self-hosted, chimera]
    needs: cache-host
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache cargo registry (should hit)
        id: cache-cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-host-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-host-

      - name: Verify cache hit
        run: |
          echo "Cache hit: ${{ steps.cache-cargo.outputs.cache-hit }}"
          test "${{ steps.cache-cargo.outputs.cache-hit }}" = "true"

      - name: Verify restored content exists
        run: |
          test -d ~/.cargo/registry
          echo "Cargo registry directory restored"

  # ── Job 8c: Cache (container mode) ─────────────────────────────
  cache-container:
    runs-on: [self-hosted, chimera]
    container:
      image: rust:1-bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache cargo registry
        id: cache-cargo
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/cargo/registry
            /usr/local/cargo/git
          key: cargo-container-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-container-

      - name: Show cache result
        run: |
          echo "Cache hit: ${{ steps.cache-cargo.outputs.cache-hit }}"
          echo "ACTIONS_CACHE_URL=$ACTIONS_CACHE_URL"

      - name: Build (populates cache on miss)
        run: cargo check

  # ── Job 8d: Cache (container mode, second run verifies hit) ────
  cache-container-verify:
    runs-on: [self-hosted, chimera]
    needs: cache-container
    container:
      image: rust:1-bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache cargo registry (should hit)
        id: cache-cargo
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/cargo/registry
            /usr/local/cargo/git
          key: cargo-container-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-container-

      - name: Verify cache hit
        run: |
          echo "Cache hit: ${{ steps.cache-cargo.outputs.cache-hit }}"
          test "${{ steps.cache-cargo.outputs.cache-hit }}" = "true"

      - name: Verify restored content exists
        run: |
          test -d /usr/local/cargo/registry
          echo "Cargo registry directory restored"

  # ── Job 9: Needs ───────────────────────────────────────────────
  setup:
    runs-on: [self-hosted, chimera]
    outputs:
      greeting: ${{ steps.gen.outputs.greeting }}
    steps:
      - name: Generate output
        id: gen
        run: echo "greeting=hello from setup" >> "$GITHUB_OUTPUT"

  needs:
    runs-on: [self-hosted, chimera]
    needs: setup
    steps:
      - name: Use needs output
        run: |
          echo "Greeting from setup job: ${{ needs.setup.outputs.greeting }}"
          test "${{ needs.setup.outputs.greeting }}" = "hello from setup"

      - name: Check needs result
        if: needs.setup.result == 'success'
        run: echo "Setup job succeeded as expected"

  # ── Job 10: Expression syntax coverage ─────────────────────────────
  expressions:
    runs-on: [self-hosted, chimera]
    needs: [setup, basics]
    steps:
      # -- Wildcard: needs.*.result --
      - name: "Wildcard: contains(needs.*.result, 'success')"
        run: |
          echo "All upstream results: ${{ toJSON(needs.*.result) }}"
          test "${{ contains(needs.*.result, 'success') }}" = "true"

      - name: "Wildcard: no failure in upstream jobs"
        run: test "${{ contains(needs.*.result, 'failure') }}" = "false"

      # -- Bracket notation --
      - name: "Bracket notation: needs['setup'].result"
        run: test "${{ needs['setup'].result }}" = "success"

      - name: "Bracket notation: needs['setup'].outputs['greeting']"
        run: test "${{ needs['setup'].outputs['greeting'] }}" = "hello from setup"

      # -- Case-insensitive functions --
      - name: "Case-insensitive: toJson()"
        run: echo "${{ toJson(needs.setup.result) }}"

      - name: "Case-insensitive: CONTAINS()"
        run: test "${{ CONTAINS('Hello World', 'hello') }}" = "true"

      - name: "Case-insensitive: startswith()"
        run: test "${{ startswith('Hello', 'hel') }}" = "true"

      - name: "Case-insensitive: EndsWith()"
        run: test "${{ EndsWith('Hello', 'llo') }}" = "true"

      # -- toJSON on objects/arrays --
      - name: "toJSON on object"
        run: |
          json='${{ toJSON(needs.setup) }}'
          echo "$json" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['result']=='success'"

      - name: "toJSON on wildcard array"
        run: |
          json='${{ toJSON(needs.*.result) }}'
          echo "$json" | python3 -c "import sys,json; d=json.load(sys.stdin); assert isinstance(d, list)"

      # -- join on arrays --
      - name: "join(needs.*.result, ', ')"
        run: |
          joined="${{ join(needs.*.result, ', ') }}"
          echo "Joined: $joined"
          echo "$joined" | grep -q "success"

      - name: "join with default separator"
        run: |
          joined="${{ join(needs.*.result) }}"
          echo "Joined: $joined"
          echo "$joined" | grep -q ","

      # -- Hex and scientific number literals --
      - name: "Hex literal: 0xFF == 255"
        run: test "${{ 0xFF == 255 }}" = "true"

      - name: "Scientific notation: 1e3 == 1000"
        run: test "${{ 1e3 == 1000 }}" = "true"

      # -- vars context (will be empty/null if no vars configured) --
      - name: "vars context: missing var is empty"
        run: test -z "${{ vars.NONEXISTENT_VAR }}"

      # -- Existing syntax still works --
      - name: "Comparison operators"
        run: |
          test "${{ 42 > 10 }}" = "true"
          test "${{ 10 <= 10 }}" = "true"
          test "${{ 10 != 20 }}" = "true"

      - name: "Boolean logic"
        run: |
          test "${{ true && true }}" = "true"
          test "${{ false || true }}" = "true"
          test "${{ !false }}" = "true"

      - name: "String functions"
        run: |
          test "${{ contains('Hello World', 'world') }}" = "true"
          test "${{ startsWith('foobar', 'foo') }}" = "true"
          test "${{ endsWith('foobar', 'bar') }}" = "true"

      - name: "format() function"
        run: |
          result="${{ format('Hello {0}, you are {1}!', 'World', 'great') }}"
          test "$result" = "Hello World, you are great!"

      - name: "Null is falsy"
        run: test "${{ null || 'fallback' }}" = "fallback"

      - name: "Parentheses grouping"
        run: test "${{ (true || false) && true }}" = "true"

      # -- Complex real-world patterns --
      - name: "Real-world: always() && contains(needs.*.result, 'success')"
        if: always() && contains(needs.*.result, 'success')
        run: echo "Conditional with wildcard works"

      - name: "Real-world: !contains(needs.*.result, 'failure')"
        if: "!contains(needs.*.result, 'failure')"
        run: echo "No failures detected via wildcard"
